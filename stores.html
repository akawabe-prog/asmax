<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取扱店舗 | ASMAX JAPAN</title>
  <meta name="description" content="ASMAX JAPAN 取扱店舗一覧。都道府県別の絞り込みと現在地から近い3店舗の検索に対応。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/shared-layout.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #151515;
      --surface-soft: #111;
      --white: #f5f5f5;
      --muted: #9a9a9a;
      --border: rgba(255,255,255,0.08);
      --accent: #ff6b00;
      --accent-soft: rgba(255,107,0,0.13);
      --container: min(1200px, calc(100vw - 40px));
      --font-ja: "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      --font-en: "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-ja);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .container { width: var(--container); margin: 0 auto; }

    .hero {
      padding: 56px 0 28px;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(ellipse 700px 280px at 50% 0%, rgba(255,107,0,0.12), transparent),
        linear-gradient(180deg, #101010 0%, var(--bg) 100%);
    }
    .eyebrow {
      color: var(--muted);
      font-family: var(--font-en);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: var(--font-en);
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      max-width: 760px;
    }

    .sec {
      padding: 44px 0;
      border-bottom: 1px solid var(--border);
    }

    .sec h2 {
      margin: 0 0 14px;
      font-family: var(--font-en);
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: -0.01em;
    }

    .finder-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-en);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--white);
      padding: 0 12px;
      font-size: 14px;
    }

    .btn {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-en);
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0 16px;
      cursor: pointer;
    }

    .btn.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--white);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .selected-store {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--surface-soft);
      display: none;
    }

    .selected-store.show { display: block; }

    .grid {
      display: grid;
      gap: 12px;
    }

    .nearest-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 16px;
    }

    .stores-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 16px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .card h3 {
      font-size: 16px;
      margin: 0;
      line-height: 1.4;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .distance {
      display: inline-flex;
      width: fit-content;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-family: var(--font-en);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .card-actions a,
    .card-actions button {
      font-family: var(--font-en);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.22);
      background: transparent;
      color: var(--white);
      border-top: 0;
      border-left: 0;
      border-right: 0;
      padding: 0;
      cursor: pointer;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1024px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .controls .btn { grid-column: 1 / -1; }
      .nearest-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 768px) {
      .controls { grid-template-columns: 1fr; }
      .nearest-grid,
      .stores-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero">
      <div class="container">
        <div class="eyebrow">ASMAX Store Finder</div>
        <h1>取扱店舗を探す</h1>
        <p>都道府県別で店舗を選択できます。現在地から近い店舗3件の表示にも対応しています。</p>
      </div>
    </section>

    <section class="sec" id="nearest">
      <div class="container">
        <h2>現在地から近い3店舗</h2>
        <div class="finder-box">
          <div class="controls" style="grid-template-columns: auto 1fr;">
            <button class="btn" id="find-nearest" type="button">現在地から検索</button>
            <p class="status" id="nearest-status">位置情報の利用を許可すると、近い3店舗を表示します。</p>
          </div>
          <div class="grid nearest-grid" id="nearest-list"></div>
        </div>
      </div>
    </section>

    <section class="sec" id="all-stores">
      <div class="container">
        <h2>全店舗一覧（都道府県で選択）</h2>
        <div class="finder-box">
          <div class="controls">
            <label>
              都道府県
              <select id="pref-select"></select>
            </label>
            <label>
              店舗
              <select id="store-select"></select>
            </label>
            <button class="btn secondary" id="clear-filter" type="button">絞り込み解除</button>
          </div>
          <p class="status" id="all-status"></p>
          <div class="selected-store" id="selected-store"></div>
          <div class="grid stores-grid" id="stores-list"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/shared-components.js"></script>
  <script>
    const stores = [
      { id: 'adachi', pref: '東京都', name: 'ナップス 足立店', address: '東京都足立区谷在家2-10-13', tel: '03-5838-7397', hours: '10:30-20:00', lat: 35.7838, lng: 139.7696 },
      { id: 'tokyo-bay', pref: '東京都', name: 'ライコランド TOKYO BAY 東雲', address: '東京都江東区東雲2-7-12', tel: '03-3527-7431', hours: '10:00-20:00', lat: 35.6498, lng: 139.8198 },
      { id: 'mitaka', pref: '東京都', name: 'ナップス 三鷹東八店', address: '東京都三鷹市野崎1-19-12', tel: '0422-40-6171', hours: '10:30-20:00', lat: 35.6775, lng: 139.5456 },
      { id: 'yokohama', pref: '神奈川県', name: 'ナップス 横浜店', address: '神奈川県横浜市戸塚区東俣野町1009', tel: '045-853-1171', hours: '10:30-20:00', lat: 35.3795, lng: 139.5114 },
      { id: 'kawasaki', pref: '神奈川県', name: 'ナップス ベイサイド幸浦店', address: '神奈川県横浜市金沢区幸浦2-17-1', tel: '045-790-1175', hours: '10:30-20:00', lat: 35.3586, lng: 139.6406 },
      { id: 'kashiwa', pref: '千葉県', name: 'ライコランド 柏店', address: '千葉県柏市風早1-10-1', tel: '04-7193-4182', hours: '10:00-20:00', lat: 35.8489, lng: 139.9797 },
      { id: 'saitama', pref: '埼玉県', name: 'ナップス 埼玉店', address: '埼玉県戸田市笹目4-19-21', tel: '048-424-3251', hours: '10:30-20:00', lat: 35.8173, lng: 139.6548 },
      { id: 'nagoya', pref: '愛知県', name: 'ライコランド 小牧店', address: '愛知県小牧市間々原新田下新池947', tel: '0568-44-2244', hours: '10:00-20:00', lat: 35.3059, lng: 136.9262 },
      { id: 'kyoto', pref: '京都府', name: 'ライコランド 京都店', address: '京都府京都市伏見区横大路芝生1', tel: '075-605-8221', hours: '10:00-20:00', lat: 34.9246, lng: 135.7317 },
      { id: 'osaka', pref: '大阪府', name: 'ナップス 東大阪店', address: '大阪府東大阪市菱江4-8-26', tel: '072-960-6111', hours: '10:30-20:00', lat: 34.6795, lng: 135.6181 },
      { id: 'kobe', pref: '兵庫県', name: 'ライコランド 姫路店', address: '兵庫県姫路市花田町一本松63-1', tel: '079-252-6225', hours: '10:00-20:00', lat: 34.8355, lng: 134.7322 },
      { id: 'fukuoka', pref: '福岡県', name: 'ナップス 福岡店', address: '福岡県太宰府市向佐野2-15-8', tel: '092-558-8100', hours: '10:30-20:00', lat: 33.5222, lng: 130.4988 }
    ];

    const nearestList = document.getElementById('nearest-list');
    const nearestStatus = document.getElementById('nearest-status');
    const findNearestBtn = document.getElementById('find-nearest');

    const prefSelect = document.getElementById('pref-select');
    const storeSelect = document.getElementById('store-select');
    const storesList = document.getElementById('stores-list');
    const allStatus = document.getElementById('all-status');
    const clearFilterBtn = document.getElementById('clear-filter');
    const selectedStoreBox = document.getElementById('selected-store');

    function toMapUrl(store) {
      return `https://maps.google.com/?q=${encodeURIComponent(store.address)}`;
    }

    function formatDistance(km) {
      if (!Number.isFinite(km)) return '';
      return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
    }

    function haversine(lat1, lng1, lat2, lng2) {
      const toRad = d => d * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function cardTemplate(store, distanceKm) {
      const distance = Number.isFinite(distanceKm)
        ? `<span class="distance">${formatDistance(distanceKm)}</span>`
        : '';

      return `
        <article class="card" data-store-id="${store.id}">
          ${distance}
          <h3>${store.name}</h3>
          <p class="meta">${store.pref} / ${store.address}</p>
          <p class="meta">TEL: ${store.tel} / 営業時間: ${store.hours}</p>
          <div class="card-actions">
            <button type="button" data-select-store="${store.id}">この店舗を選択</button>
            <a href="${toMapUrl(store)}" target="_blank" rel="noopener">Map</a>
          </div>
        </article>
      `;
    }

    function renderStoreSelect(filtered) {
      storeSelect.innerHTML = [
        '<option value="">選択してください</option>',
        ...filtered.map(store => `<option value="${store.id}">${store.name}</option>`)
      ].join('');

      storeSelect.disabled = filtered.length === 0;
    }

    function showSelectedStore(store) {
      if (!store) {
        selectedStoreBox.classList.remove('show');
        selectedStoreBox.innerHTML = '';
        return;
      }

      selectedStoreBox.classList.add('show');
      selectedStoreBox.innerHTML = `
        <strong style="font-size:15px;">選択中: ${store.name}</strong>
        <p class="meta" style="margin-top:6px;">${store.pref} / ${store.address}</p>
        <p class="meta">TEL: ${store.tel} / 営業時間: ${store.hours}</p>
      `;
    }

    function renderAllStores() {
      const pref = prefSelect.value;
      const filtered = pref === 'all' ? stores : stores.filter(store => store.pref === pref);
      const prevSelectedId = storeSelect.value;

      storesList.innerHTML = filtered.length
        ? filtered.map(store => cardTemplate(store)).join('')
        : '<p class="empty">該当する店舗がありません。</p>';

      allStatus.textContent = `${filtered.length}件表示中`;
      renderStoreSelect(filtered);

      const selected = filtered.find(store => store.id === prevSelectedId) || null;
      storeSelect.value = selected ? selected.id : '';
      showSelectedStore(selected);
    }

    function initPrefSelect() {
      const prefs = [...new Set(stores.map(store => store.pref))].sort((a, b) => a.localeCompare(b, 'ja'));
      prefSelect.innerHTML = ['<option value="all">すべて</option>', ...prefs.map(pref => `<option value="${pref}">${pref}</option>`)].join('');
    }

    function bindStoreSelectButtons() {
      storesList.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const id = target.dataset.selectStore;
        if (!id) return;

        const store = stores.find(s => s.id === id);
        if (!store) return;

        prefSelect.value = store.pref;
        renderAllStores();
        storeSelect.value = store.id;
        showSelectedStore(store);
      });
    }

    function renderNearest(lat, lng) {
      const nearest = stores
        .map(store => ({ ...store, distanceKm: haversine(lat, lng, store.lat, store.lng) }))
        .sort((a, b) => a.distanceKm - b.distanceKm)
        .slice(0, 3);

      nearestList.innerHTML = nearest.map(store => cardTemplate(store, store.distanceKm)).join('');
    }

    function findNearestStores() {
      if (!navigator.geolocation) {
        nearestStatus.textContent = 'このブラウザでは位置情報が利用できません。';
        return;
      }

      nearestStatus.textContent = '現在地を取得しています...';
      navigator.geolocation.getCurrentPosition(
        ({ coords }) => {
          renderNearest(coords.latitude, coords.longitude);
          nearestStatus.textContent = '現在地から近い3店舗を表示しました。';
        },
        () => {
          nearestStatus.textContent = '位置情報を取得できませんでした。許可設定をご確認ください。';
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
      );
    }

    initPrefSelect();
    renderAllStores();
    bindStoreSelectButtons();

    prefSelect.addEventListener('change', renderAllStores);
    storeSelect.addEventListener('change', () => {
      const selected = stores.find(store => store.id === storeSelect.value) || null;
      showSelectedStore(selected);
    });
    clearFilterBtn.addEventListener('click', () => {
      prefSelect.value = 'all';
      renderAllStores();
    });
    findNearestBtn.addEventListener('click', findNearestStores);
  </script>
</body>
</html>
