<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取扱店舗 — 全国のナップス・バイクワールド・南海部品で | ASMAX JAPAN</title>
<meta name="description" content="ASMAX製品の取扱店舗一覧(全国31店舗)。ナップス・バイクワールド・南海部品。現在地検索・都道府県検索に対応。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/atmos-sub.css">
<style>
.finder{margin-top:6vh}
.finder .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:26px}
.finder select{appearance:none;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:13px 44px 13px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--sub) 50%),linear-gradient(135deg,var(--sub) 50%,transparent 50%);background-position:calc(100% - 20px) 50%,calc(100% - 14px) 50%;background-size:6px 6px;background-repeat:no-repeat}
.finder .count{font-size:13px;color:var(--sub)}
.finder .count b{color:var(--accent);font-family:var(--font-en);font-size:16px}
.store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:960px){.store-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.store-grid{grid-template-columns:1fr}}
.store{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.store .dist{position:absolute;top:16px;right:16px;font-family:var(--font-en);font-weight:800;font-size:13px;color:var(--accent);background:var(--accent-dim);border-radius:99px;padding:4px 13px}
.near-ctl{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.near-status{font-size:13px;color:var(--sub);font-weight:700}
.finder input[type="search"]{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:12px 18px;font:inherit;font-size:14px;min-width:220px}
.finder input[type="search"]::placeholder{color:var(--sub)}
.chain-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chain-chips button{font-size:12px;font-weight:700;color:var(--sub);border:1px solid var(--line);border-radius:99px;padding:7px 16px;transition:.25s}
.chain-chips button:hover{color:var(--ink);border-color:var(--accent)}
.chain-chips button.on{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.store .pref{font-size:10.5px;font-weight:700;color:var(--accent);letter-spacing:.08em}
.store b{display:block;font-size:14.5px;margin:6px 0 8px;line-height:1.5}
.store p{font-size:12.5px;color:var(--sub);line-height:1.7}
.store .tel{font-family:var(--font-en);font-weight:700;color:var(--ink)}
.store a.map{display:inline-block;margin-top:10px;font-size:12px;font-weight:700;color:var(--accent)}
.morewrap{text-align:center;margin-top:30px}
</style>
</head>
<body>

<section class="page-hero photo">
  <div class="ph" style="background-image:url('../assets/v3/f1-night.jpg')"></div>
  <div class="wrap">
    <p class="eyebrow rv">STORES</p>
    <h1 class="rv" data-d="1">触って、聴いて、確かめる。</h1>
    <p class="lead rv" data-d="2" style="color:#c9d2d9">ASMAX製品はナップス・バイクワールド・南海部品の全国31店舗でお取り扱い中。実物のサイズ感、装着感、操作感を店頭でお確かめいただけます。</p>
  </div>
</section>

<section class="sec wrap" id="nearest">
  <div class="sec-head rv">
    <p class="fno">NEAREST — 現在地から</p>
    <h2>いちばん近い3店舗をさがす</h2>
    <p class="s">位置情報の利用を許可すると、現在地から近い店舗を距離つきで表示します。</p>
  </div>
  <div class="near-ctl rv" data-d="1">
    <button class="btn btn-accent" id="findNearest">📍 現在地から検索</button>
    <p class="near-status" id="nearStatus"></p>
  </div>
  <div class="store-grid" id="nearGrid" style="margin-top:22px"></div>
</section>

<section class="sec wrap">
  <div class="sec-head rv">
    <p class="fno">STORE FINDER</p>
    <h2>都道府県からさがす</h2>
  </div>
  <div class="finder rv" style="margin-top:0">
    <div class="controls">
      <select id="prefSel" aria-label="都道府県で絞り込み"><option value="">すべての都道府県</option></select>
      <input type="search" id="kw" placeholder="店舗名・住所で検索" aria-label="店舗名・住所で検索">
      <button class="btn btn-ghost" id="clearBtn" style="padding:12px 22px;font-size:13px">クリア</button>
      <p class="count"><b id="cnt">0</b> 店舗</p>
    </div>
    <div class="chain-chips" id="chainChips">
      <button data-c="ナップス">ナップス</button><button data-c="バイクワールド">バイクワールド</button><button data-c="南海部品">南海部品</button>
    </div>
    <div class="store-grid" id="storeGrid"></div>
    <div class="morewrap"><button class="btn btn-ghost" id="moreBtn">さらに表示する</button></div>
  </div>
</section>

<section class="cta-band">
  <div class="wrap">
    <p class="t rv">近くに店舗がなくても、大丈夫。</p>
    <p class="s rv" data-d="1">公式オンラインストアなら全国配送+メーカー保証4年。</p>
    <div class="acts rv" data-d="2"><a class="btn btn-accent en" href="../index.html#shop">SHOP ONLINE</a></div>
  </div>
</section>

<footer></footer>
<script src="../assets/js/stores-data.js"></script>
<script src="../assets/js/atmos-sub.js"></script>
<script>
const stores = window.ASMAX_STORES || [];
const PAGE = 24;
let filtered = stores, shown = 0;
const grid = document.getElementById('storeGrid');
const cnt = document.getElementById('cnt');
const moreBtn = document.getElementById('moreBtn');
const sel = document.getElementById('prefSel');
const kw = document.getElementById('kw');

// 都道府県プルダウン(データ順を保持)
[...new Set(stores.map(s => s.pref))].forEach(p => {
  const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o);
});

function fmtDist(km) {
  return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
}
function card(s, distanceKm) {
  const q = encodeURIComponent(s.name.replace(/株式会社/g, '') + ' ' + s.address);
  const dist = Number.isFinite(distanceKm) ? `<span class="dist">${fmtDist(distanceKm)}</span>` : '';
  return `<div class="store">${dist}<p class="pref">${s.pref}</p><b>${s.name}</b><p>${s.address}<br>TEL: <span class="tel">${s.tel}</span><br>${s.hours}</p><a class="map" href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">Googleマップで見る →</a></div>`;
}
function applyFilter() {
  const q = (kw.value || '').trim();
  filtered = stores.filter(s =>
    (!sel.value || s.pref === sel.value) &&
    (!q || s.name.includes(q) || s.address.includes(q))
  );
  render(true);
}
function render(reset) {
  if (reset) { grid.innerHTML = ''; shown = 0; }
  const next = filtered.slice(shown, shown + PAGE);
  grid.insertAdjacentHTML('beforeend', next.map(s => card(s)).join(''));
  shown += next.length;
  cnt.textContent = filtered.length;
  moreBtn.style.display = shown < filtered.length ? '' : 'none';
}
sel.addEventListener('change', applyFilter);
kw.addEventListener('input', applyFilter);
document.getElementById('clearBtn').addEventListener('click', () => { sel.value = ''; kw.value = ''; syncChips(); applyFilter(); });
const chips = [...document.querySelectorAll('#chainChips button')];
function syncChips() { chips.forEach(c => c.classList.toggle('on', kw.value === c.dataset.c)); }
chips.forEach(c => c.addEventListener('click', () => { kw.value = kw.value === c.dataset.c ? '' : c.dataset.c; syncChips(); applyFilter(); }));
kw.addEventListener('input', syncChips);

moreBtn.addEventListener('click', () => render(false));
render(true);

/* ── 現在地から近い3店舗(ハーサイン距離) ── */
const nearGrid = document.getElementById('nearGrid');
const nearStatus = document.getElementById('nearStatus');
function haversine(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180, R = 6371;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function renderNearest(lat, lng) {
  const nearest = stores
    .filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng))
    .map(s => ({ ...s, d: haversine(lat, lng, s.lat, s.lng) }))
    .sort((a, b) => a.d - b.d)
    .slice(0, 3);
  if (!nearest.length) {
    nearStatus.textContent = '座標データが見つかりませんでした。都道府県からお探しください。';
    return;
  }
  nearGrid.innerHTML = nearest.map(s => card(s, s.d)).join('');
  nearStatus.textContent = `現在地から近い${nearest.length}店舗を表示しています。`;
}
document.getElementById('findNearest').addEventListener('click', () => {
  if (!navigator.geolocation) {
    nearStatus.textContent = 'このブラウザでは位置情報が利用できません。';
    return;
  }
  nearStatus.textContent = '現在地を取得しています...';
  navigator.geolocation.getCurrentPosition(
    ({ coords }) => renderNearest(coords.latitude, coords.longitude),
    () => { nearStatus.textContent = '位置情報を取得できませんでした。ブラウザの許可設定をご確認ください。'; },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
  );
});
/* ── TOPからのディープリンク: ?chain=◯◯ で絞り込み / ?near=1 で現在地検索を自動実行 ── */
const params = new URLSearchParams(location.search);
if (params.get('chain')) {
  kw.value = params.get('chain');
  syncChips(); applyFilter();
  document.querySelector('.finder').scrollIntoView({behavior: 'smooth', block: 'start'});
}
if (params.get('near') === '1') {
  document.getElementById('nearest').scrollIntoView({behavior: 'smooth', block: 'start'});
  document.getElementById('findNearest').click();
}

</script>
</body>
</html>
